<template>
  <div class="cases-container">
    <!-- Section header -->
    <div class="section-header">
      <div class="section-title-row">
        <div class="section-title-group">
          <svg class="section-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path
              fill="currentColor"
              d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm-1 7V3.5L18.5 9H13zM6 20V4h5v7h7v9H6z"
            />
          </svg>
          <h2 class="section-title">My Cases</h2>
        </div>
        <template lwc:if={showCaseForm}>
          <button
            class="btn-cancel-case"
            onclick={handleCancelCase}
            type="button"
          >
            Cancel
          </button>
        </template>
        <template lwc:else>
          <button class="btn-log-case" onclick={handleLogCase} type="button">
            <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path
                fill="currentColor"
                d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"
              />
            </svg>
            Log a Case
          </button>
        </template>
      </div>
      <p class="section-subtitle">Track your support requests</p>
    </div>

    <!-- Inline case creation flow -->
    <template lwc:if={showCaseForm}>
      <div class="case-form-container">
        <lightning-flow
          flow-api-name="NTO_Create_Case"
          onstatuschange={handleFlowStatusChange}
        ></lightning-flow>
      </div>
    </template>

    <!-- Case list (hidden while form is open) -->
    <template lwc:else>
      <!-- Filter + search bar -->
      <div class="nto-cases-controls">
        <div
          class="nto-filter-chips"
          role="group"
          aria-label="Filter cases by status"
        >
          <template for:each={statusFilterOptions} for:item="opt">
            <button
              key={opt.value}
              class={opt.cls}
              data-value={opt.value}
              onclick={handleStatusFilterClick}
              type="button"
            >
              {opt.label}
            </button>
          </template>
        </div>
        <div class="nto-cases-search-wrap">
          <label class="slds-assistive-text" for="cases-search"
            >Search cases by number or subject</label
          >
          <input
            id="cases-search"
            type="search"
            class="nto-cases-search"
            placeholder="Search case # or subject"
            oninput={handleCaseSearch}
          />
        </div>
      </div>

      <!-- Loading -->
      <template lwc:if={isLoading}>
        <div class="state-container">
          <lightning-spinner
            alternative-text="Loading your cases"
            size="medium"
          ></lightning-spinner>
          <p class="state-text">Loading your cases&hellip;</p>
        </div>
      </template>

      <!-- Error -->
      <template lwc:elseif={hasError}>
        <div class="state-container state-error">
          <lightning-icon
            icon-name="utility:error"
            variant="error"
            size="small"
          ></lightning-icon>
          <p class="state-text">{errorMessage}</p>
        </div>
      </template>

      <!-- Cases -->
      <template lwc:elseif={hasCases}>
        <ul class="case-list">
          <template for:each={filteredCases} for:item="caseItem">
            <li key={caseItem.id} class="case-item">
              <div class="case-layout">
                <div class="case-main">
                  <!-- Subject dominates (H3, serif) -->
                  <h3 class={caseItem.subjectClass}>
                    {caseItem.displaySubject}
                  </h3>
                  <!-- Meta row: case # · priority dot · opened date -->
                  <p class="case-meta">
                    <span class="case-number">{caseItem.caseNumber}</span>
                    <span class="case-meta-sep" aria-hidden="true"
                      >&nbsp;&middot;&nbsp;</span
                    >
                    <span
                      class={caseItem.priorityClass}
                      aria-hidden="true"
                    ></span>
                    <span class="priority-label">{caseItem.priority}</span>
                    <span class="case-meta-sep" aria-hidden="true"
                      >&nbsp;&middot;&nbsp;</span
                    >
                    <span class="case-date">{caseItem.openedLabel}</span>
                  </p>
                </div>
                <span class={caseItem.statusClass}>{caseItem.status}</span>
              </div>
            </li>
          </template>
        </ul>
      </template>

      <!-- Empty -->
      <template lwc:else>
        <div class="state-container state-empty">
          <svg class="empty-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path
              fill="currentColor"
              d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"
            />
          </svg>
          <p class="state-heading">No open cases &mdash; nice.</p>
          <p class="state-text">You have no support cases on file.</p>
          <button
            class="btn-log-case-empty"
            onclick={handleLogCase}
            type="button"
          >
            <svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path
                fill="currentColor"
                d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"
              />
            </svg>
            Log a New Case
          </button>
        </div>
      </template>
    </template>
  </div>
</template>
