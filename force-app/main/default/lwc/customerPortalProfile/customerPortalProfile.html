<template>
  <lightning-card title="My Account" icon-name="standard:account">
    <template lwc:if={isLoading}>
      <div class="slds-p-around_large slds-align_absolute-center">
        <lightning-spinner
          alternative-text="Loading your account"
          size="small"
        ></lightning-spinner>
      </div>
    </template>

    <template lwc:elseif={hasError}>
      <div class="slds-p-around_medium slds-text-color_error" role="alert">
        <lightning-icon
          icon-name="utility:error"
          variant="error"
          size="x-small"
          class="slds-m-right_xx-small"
        ></lightning-icon>
        <span>{errorMessage}</span>
      </div>
    </template>

    <template lwc:elseif={summary}>
      <div class="slds-p-horizontal_medium slds-p-bottom_medium">
        <!-- Welcome + lifetime value -->
        <div class="slds-p-bottom_small slds-border_bottom">
          <h2 class="slds-text-heading_medium">Welcome back, {summary.name}</h2>
          <p class="slds-text-body_small slds-text-color_weak">
            Lifetime value:
            <lightning-formatted-number
              value={summary.lifetimeValue}
              format-style="currency"
              currency-code="USD"
            ></lightning-formatted-number>
          </p>
        </div>

        <!-- My Orders -->
        <h3
          class="slds-text-title_caps slds-text-color_weak slds-p-top_medium slds-p-bottom_x-small"
        >
          My Orders
        </h3>
        <template lwc:if={hasOrders}>
          <table class="slds-table slds-table_cell-buffer slds-table_bordered">
            <thead>
              <tr class="slds-line-height_reset">
                <th scope="col"><div class="slds-truncate">Order</div></th>
                <th scope="col"><div class="slds-truncate">Status</div></th>
                <th scope="col">
                  <div class="slds-truncate slds-text-align_right">Total</div>
                </th>
              </tr>
            </thead>
            <tbody>
              <template for:each={orders} for:item="order">
                <tr key={order.orderNumber}>
                  <th scope="row">
                    <div class="slds-truncate">{order.orderNumber}</div>
                  </th>
                  <td>
                    <lightning-badge label={order.status}></lightning-badge>
                  </td>
                  <td class="slds-text-align_right">
                    <lightning-formatted-number
                      value={order.total}
                      format-style="currency"
                      currency-code="USD"
                    ></lightning-formatted-number>
                  </td>
                </tr>
              </template>
            </tbody>
          </table>
        </template>
        <template lwc:else>
          <p class="slds-p-around_small slds-text-color_weak">
            You have no orders yet.
          </p>
        </template>

        <!-- My Cases -->
        <h3
          class="slds-text-title_caps slds-text-color_weak slds-p-top_medium slds-p-bottom_x-small"
        >
          My Recent Cases
        </h3>
        <template lwc:if={hasCases}>
          <ul class="slds-has-dividers_bottom-space">
            <template for:each={recentCases} for:item="caseItem">
              <li key={caseItem.id} class="slds-item slds-p-vertical_xx-small">
                <div
                  class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center"
                >
                  <span class="slds-truncate" title={caseItem.subject}
                    >{caseItem.subject}</span
                  >
                  <lightning-badge label={caseItem.status}></lightning-badge>
                </div>
                <p class="slds-text-body_small slds-text-color_weak">
                  {caseItem.caseNumber}
                </p>
              </li>
            </template>
          </ul>
        </template>
        <template lwc:else>
          <p class="slds-p-around_small slds-text-color_weak">
            You have no cases on file.
          </p>
        </template>
      </div>
    </template>
  </lightning-card>
</template>
