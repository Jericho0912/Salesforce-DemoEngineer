<template>
  <div class="nto-profile">
    <!-- Loading -->
    <template lwc:if={isLoading}>
      <div class="nto-profile__state">
        <lightning-spinner
          alternative-text="Loading your account"
          size="small"
        ></lightning-spinner>
      </div>
    </template>

    <!-- Error -->
    <template lwc:elseif={hasError}>
      <div class="nto-profile__state nto-profile__state_error" role="alert">
        <lightning-icon
          icon-name="utility:error"
          variant="error"
          size="x-small"
        ></lightning-icon>
        <span class="slds-m-left_x-small">{errorMessage}</span>
      </div>
    </template>

    <!-- Main content -->
    <template lwc:elseif={summary}>
      <!-- ── Identity header ── -->
      <div class="nto-profile__header">
        <div class="nto-profile__avatar" aria-hidden="true">{initials}</div>

        <div class="nto-profile__identity">
          <h1 class="nto-profile__name">{summary.name}</h1>
          <p class="nto-profile__email">{summary.email}</p>
          <!-- phone: not returned by getMyProfile — add Phone to the Contact
               query in Customer360Controller.getCustomerSummary if needed -->
          <div class="nto-profile__badges">
            <span class="nto-profile__tier-badge">
              <svg
                viewBox="0 0 24 24"
                class="nto-profile__badge-icon"
                aria-hidden="true"
              >
                <path
                  fill="currentColor"
                  d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"
                />
              </svg>
              Summit Member
            </span>
            <template lwc:if={summary.atRisk}>
              <span class="nto-profile__risk-badge">At Risk</span>
            </template>
          </div>
          <!-- member-since: CreatedDate not returned by getMyProfile —
               add Contact.CreatedDate to the summary query if needed -->
        </div>

        <div class="nto-profile__stats">
          <div class="nto-profile__stat-tile">
            <span class="nto-profile__stat-label">Lifetime Value</span>
            <span class="nto-profile__stat-value">
              <lightning-formatted-number
                value={summary.lifetimeValue}
                format-style="currency"
                currency-code="USD"
              ></lightning-formatted-number>
            </span>
          </div>
          <div class="nto-profile__stat-tile">
            <span class="nto-profile__stat-label">Open Cases</span>
            <span class="nto-profile__stat-value">{summary.openCaseCount}</span>
          </div>
        </div>
      </div>

      <!-- ── Actions ── -->
      <div class="nto-profile__actions">
        <button
          class="nto-profile__btn nto-profile__btn_primary"
          onclick={handleLogout}
        >
          <svg
            viewBox="0 0 24 24"
            class="nto-profile__btn-icon"
            aria-hidden="true"
          >
            <path
              fill="currentColor"
              d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"
            />
          </svg>
          Sign Out
        </button>
        <button class="nto-profile__btn nto-profile__btn_secondary" disabled>
          Edit Profile
        </button>
      </div>

      <!-- ── My Orders ── -->
      <section class="nto-profile__section">
        <div class="nto-profile__section-header">
          <h2 class="nto-profile__section-title">My Orders</h2>
          <button class="nto-profile__view-all" onclick={handleViewAllOrders}>
            View all orders &rarr;
          </button>
        </div>

        <template lwc:if={hasOrders}>
          <div class="nto-profile__table-wrap">
            <table
              class="slds-table slds-table_cell-buffer slds-table_bordered nto-profile__table"
            >
              <thead>
                <tr class="slds-line-height_reset">
                  <th scope="col"><div class="slds-truncate">Order #</div></th>
                  <th scope="col"><div class="slds-truncate">Status</div></th>
                  <th scope="col">
                    <div class="slds-truncate slds-text-align_right">Total</div>
                  </th>
                </tr>
              </thead>
              <tbody>
                <template for:each={orders} for:item="order">
                  <tr key={order.orderNumber}>
                    <th scope="row">
                      <div class="slds-truncate nto-profile__order-num">
                        {order.orderNumber}
                      </div>
                    </th>
                    <td>
                      <lightning-badge label={order.status}></lightning-badge>
                    </td>
                    <td class="slds-text-align_right">
                      <lightning-formatted-number
                        value={order.total}
                        format-style="currency"
                        currency-code="USD"
                      ></lightning-formatted-number>
                    </td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>
        </template>
        <template lwc:else>
          <p class="nto-profile__empty">
            No orders yet — explore our gear and hit the trail!
          </p>
        </template>
      </section>

      <!-- ── Recent Support Cases ── -->
      <section class="nto-profile__section">
        <div class="nto-profile__section-header">
          <h2 class="nto-profile__section-title">Recent Support Cases</h2>
          <button class="nto-profile__view-all" onclick={handleViewAllCases}>
            View all cases &rarr;
          </button>
        </div>

        <template lwc:if={hasCases}>
          <ul class="nto-profile__case-list">
            <template for:each={displayCases} for:item="caseItem">
              <li key={caseItem.id} class="nto-profile__case-item">
                <div class="nto-profile__case-top">
                  <span class="nto-profile__case-num"
                    >{caseItem.caseNumber}</span
                  >
                  <lightning-badge label={caseItem.status}></lightning-badge>
                </div>
                <p
                  class="nto-profile__case-subject"
                  title={caseItem.displaySubject}
                >
                  {caseItem.displaySubject}
                </p>
              </li>
            </template>
          </ul>
        </template>
        <template lwc:else>
          <p class="nto-profile__empty">No support cases on file.</p>
        </template>
      </section>
    </template>
  </div>
</template>
