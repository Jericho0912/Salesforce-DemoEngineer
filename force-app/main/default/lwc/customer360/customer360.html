<template>
  <lightning-card title="Customer 360" icon-name="standard:contact">
    <!-- Loading state -->
    <template lwc:if={isLoading}>
      <div class="slds-p-around_large slds-align_absolute-center">
        <lightning-spinner
          alternative-text="Loading customer"
          size="small"
        ></lightning-spinner>
      </div>
    </template>

    <!-- Error state -->
    <template lwc:elseif={hasError}>
      <div class="slds-p-around_medium slds-text-color_error" role="alert">
        <lightning-icon
          icon-name="utility:error"
          variant="error"
          size="x-small"
          class="slds-m-right_xx-small"
        ></lightning-icon>
        <span>{errorMessage}</span>
      </div>
    </template>

    <!-- Loaded state -->
    <template lwc:elseif={summary}>
      <div class="slds-p-horizontal_medium slds-p-bottom_medium">
        <!-- Header: name / account / email + risk badge -->
        <div
          class="slds-grid slds-grid_align-spread slds-p-bottom_small slds-border_bottom"
        >
          <div>
            <h2 class="slds-text-heading_small slds-truncate" title={name}>
              {name}
            </h2>
            <p class="slds-text-body_small slds-text-color_weak">
              {accountName}
            </p>
            <p class="slds-text-body_small">{email}</p>
          </div>
          <template lwc:if={summary.atRisk}>
            <span
              class="slds-badge slds-theme_error risk-badge"
              title="2 or more open High-priority cases"
            >
              <lightning-icon
                icon-name="utility:warning"
                size="xx-small"
                variant="inverse"
                class="slds-m-right_xx-small"
              ></lightning-icon>
              At Risk
            </span>
          </template>
        </div>

        <!-- KPIs -->
        <div class="slds-grid slds-gutters slds-p-vertical_small">
          <div class="slds-col">
            <p class="slds-text-title_caps slds-text-color_weak">
              Lifetime Value
            </p>
            <lightning-formatted-number
              value={summary.lifetimeValue}
              format-style="currency"
              currency-code="USD"
              class="slds-text-heading_medium"
            ></lightning-formatted-number>
          </div>
          <div class="slds-col">
            <p class="slds-text-title_caps slds-text-color_weak">Open Cases</p>
            <p class="slds-text-heading_medium">{summary.openCaseCount}</p>
          </div>
        </div>

        <!-- Recent cases -->
        <p
          class="slds-text-title_caps slds-text-color_weak slds-p-top_small slds-p-bottom_xx-small"
        >
          Recent Cases
        </p>
        <template lwc:if={hasRecentCases}>
          <ul class="slds-has-dividers_bottom-space">
            <template for:each={summary.recentCases} for:item="caseItem">
              <li key={caseItem.id} class="slds-item slds-p-vertical_xx-small">
                <div
                  class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center"
                >
                  <span class="slds-truncate" title={caseItem.subject}
                    >{caseItem.subject}</span
                  >
                  <lightning-badge label={caseItem.status}></lightning-badge>
                </div>
                <p class="slds-text-body_small slds-text-color_weak">
                  {caseItem.caseNumber} &middot; {caseItem.priority} priority
                </p>
              </li>
            </template>
          </ul>
        </template>
        <template lwc:else>
          <div
            class="slds-p-around_medium slds-text-align_center slds-text-color_weak"
          >
            No cases on file for this customer.
          </div>
        </template>
      </div>
    </template>
  </lightning-card>
</template>
