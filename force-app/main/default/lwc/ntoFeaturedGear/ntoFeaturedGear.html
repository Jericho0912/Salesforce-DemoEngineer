<template>
  <div class="nto-featured-gear">
    <template lwc:if={isLoading}>
      <div class="nto-featured-gear__loading" role="status">
        <lightning-spinner
          alternative-text="Loading featured gear"
          size="medium"
        ></lightning-spinner>
      </div>
    </template>

    <template lwc:elseif={hasError}>
      <div
        class="nto-featured-gear__panel nto-featured-gear__panel_error"
        role="alert"
      >
        <p class="nto-featured-gear__panel-heading">
          We couldn&rsquo;t load featured gear.
        </p>
        <p class="nto-featured-gear__panel-body">{errorMessage}</p>
      </div>
    </template>

    <template lwc:elseif={isEmpty}>
      <div class="nto-featured-gear__panel nto-featured-gear__panel_empty">
        <p class="nto-featured-gear__panel-body">
          Featured gear is on its way.
        </p>
      </div>
    </template>

    <template lwc:elseif={hasData}>
      <header class="nto-featured-gear__header">
        <h2 class="nto-featured-gear__title">Picked for you</h2>
        <p class="nto-featured-gear__subtitle">
          Recommended for your next trail.
        </p>
      </header>

      <div class="nto-featured-gear__grid">
        <template for:each={cards} for:item="item">
          <article key={item.key} class="nto-featured-gear__card">
            <div class="nto-featured-gear__media">
              <template lwc:if={item.imageUrl}>
                <img
                  class="nto-featured-gear__image"
                  src={item.imageUrl}
                  alt={item.name}
                />
              </template>
              <template lwc:else>
                <div
                  class="nto-featured-gear__placeholder"
                  role="img"
                  aria-label={item.name}
                ></div>
              </template>
            </div>
            <div class="nto-featured-gear__body">
              <h3 class="nto-featured-gear__name" title={item.name}>
                {item.name}
              </h3>
              <template lwc:if={item.family}>
                <p class="nto-featured-gear__family" title={item.family}>
                  {item.family}
                </p>
              </template>
              <div class="nto-featured-gear__footer">
                <p class="nto-featured-gear__price">
                  <lightning-formatted-number
                    value={item.price}
                    format-style="currency"
                    currency-code="USD"
                  ></lightning-formatted-number>
                </p>
                <a href="#" class="nto-featured-gear__cta">View details</a>
              </div>
            </div>
          </article>
        </template>
      </div>
    </template>
  </div>
</template>
