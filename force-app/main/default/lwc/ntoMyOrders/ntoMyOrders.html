<template>
  <div class="nto-my-orders">
    <!-- Section header -->
    <header class="nto-my-orders__header">
      <h2 class="nto-my-orders__title">My Orders</h2>
      <p class="nto-my-orders__subtitle">Your most recent purchases.</p>
    </header>

    <template lwc:if={isLoading}>
      <div class="nto-my-orders__state" role="status">
        <lightning-spinner
          alternative-text="Loading your orders"
          size="small"
        ></lightning-spinner>
      </div>
    </template>

    <template lwc:elseif={hasError}>
      <div class="nto-my-orders__state nto-my-orders__state_error" role="alert">
        <lightning-icon
          icon-name="utility:error"
          alternative-text="Error"
          size="small"
        ></lightning-icon>
        <p class="slds-m-left_x-small">{errorMessage}</p>
      </div>
    </template>

    <template lwc:elseif={hasOrders}>
      <!-- Filter row -->
      <div class="nto-my-orders__controls">
        <div class="nto-filter-chips" role="group" aria-label="Filter orders">
          <template for:each={filterOptions} for:item="opt">
            <button
              key={opt.value}
              class={opt.cls}
              data-value={opt.value}
              onclick={handleFilterClick}
              type="button"
            >
              {opt.label}
            </button>
          </template>
        </div>
        <div class="nto-my-orders__search-wrap">
          <label class="slds-assistive-text" for="orders-search"
            >Search orders by number</label
          >
          <input
            id="orders-search"
            type="search"
            class="nto-my-orders__search"
            placeholder="Search order #"
            value={_searchQuery}
            oninput={handleSearch}
          />
        </div>
      </div>

      <!-- Order grid -->
      <template lwc:if={hasFilteredOrders}>
        <div class="nto-orders-grid">
          <template for:each={filteredOrders} for:item="order">
            <article key={order.key} class="nto-order-card">
              <!-- Top: order number + status pill -->
              <div class="nto-order-card__top">
                <span class="nto-order-card__number">{order.orderNumber}</span>
                <span class={order.pillClass}>{order.status}</span>
              </div>

              <!-- Total -->
              <p class="nto-order-card__total">
                <lightning-formatted-number
                  value={order.total}
                  format-style="currency"
                  currency-code="USD"
                ></lightning-formatted-number>
              </p>

              <!-- Fulfilment text -->
              <p class="nto-order-card__status-text">{order.statusText}</p>

              <!-- Actions -->
              <div class="nto-order-card__actions">
                <a
                  href="javascript:void(0)"
                  class="nto-order-card__action-link nto-order-card__action-link_primary"
                  onclick={handleViewOrder}
                >
                  View details
                </a>
                <button
                  type="button"
                  class="nto-order-card__action-link nto-order-card__action-link_secondary"
                  onclick={handleReturnItem}
                >
                  Return an item
                </button>
              </div>
            </article>
          </template>
        </div>
      </template>
      <template lwc:else>
        <p class="nto-my-orders__no-results">No orders match that filter.</p>
      </template>
    </template>

    <template lwc:else>
      <div class="nto-my-orders__state nto-my-orders__state_empty">
        <svg
          viewBox="0 0 24 24"
          class="nto-my-orders__empty-icon"
          aria-hidden="true"
        >
          <path
            fill="currentColor"
            d="M20 4H4a2 2 0 00-2 2v12a2 2 0 002 2h16a2 2 0 002-2V6a2 2 0 00-2-2zm0 14H4V8l8 5 8-5v10zm0-12l-8 5-8-5V6h16v0z"
          />
        </svg>
        <p class="nto-my-orders__empty-title">
          No orders yet — let&rsquo;s change that.
        </p>
        <button
          type="button"
          class="nto-my-orders__home-link"
          onclick={handleGoHome}
        >
          Explore gear
        </button>
      </div>
    </template>
  </div>
</template>
